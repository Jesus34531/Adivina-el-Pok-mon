<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¿Quién es ese Pokémon?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFD700;
      --yellow-glow: rgba(255,215,0,0.35);
      --red: #FF3B3B;
      --green: #00E676;
      --dark: #0a0a1a;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.10);
      --surface: rgba(255,255,255,0.07);
      --text: #f0f0ff;
      --muted: #7a8ab0;
      --blue-accent: #4f8ef7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,142,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,60,60,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,215,0,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* ── Grid dots overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .quiz-wrap {
      position: relative;
      z-index: 1;
      max-width: 580px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    .header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--yellow);
      letter-spacing: 1px;
      line-height: 1.8;
      text-shadow: 0 0 20px var(--yellow-glow), 2px 2px 0 #7a5c00;
    }
    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    /* ── Glass card base ── */
    .glass {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ── Difficulty screen ── */
    .diff-screen {
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .diff-screen h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--yellow);
      margin-bottom: 2rem;
      line-height: 2;
      text-shadow: 0 0 12px var(--yellow-glow);
    }
    .diff-btns { display: flex; flex-direction: column; gap: 12px; }
    .diff-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .diff-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .diff-btn:hover {
      transform: translateX(8px) scale(1.02);
      border-color: var(--yellow);
      box-shadow: 0 0 20px rgba(255,215,0,0.15), inset 0 0 20px rgba(255,215,0,0.03);
    }
    .diff-btn .icon { font-size: 26px; flex-shrink: 0; }
    .diff-btn .meta { flex: 1; }
    .diff-btn .meta span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 3px;
    }
    .diff-btn .arrow {
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.2s;
    }
    .diff-btn:hover .arrow { transform: translateX(4px); color: var(--yellow); }

    /* ── Game screen ── */
    .game-screen { display: none; }
    .game-screen.active { display: block; }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .q-counter {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .score-badge {
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 30px;
      padding: 6px 16px;
      font-weight: 900;
      color: var(--yellow);
      font-size: 14px;
      text-shadow: 0 0 10px var(--yellow-glow);
      transition: all 0.3s;
    }
    .score-badge.bump {
      transform: scale(1.2);
      box-shadow: 0 0 16px var(--yellow-glow);
    }

    /* ── Progress bar ── */
    .progress-wrap { margin-bottom: 1.25rem; }
    .progress-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f4a700, var(--yellow), #ffe066);
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--yellow-glow);
    }

    /* ── Silhouette card ── */
    .sil-card {
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .sil-card .bg-glow {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: background 0.6s;
    }
    .sil-card.revealed-card .bg-glow {
      background: radial-gradient(circle, rgba(255,215,0,0.18) 0%, transparent 70%);
    }
    .sil-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }
    .sil-img-wrap {
      position: relative;
      z-index: 1;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .sil-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      image-rendering: pixelated;
      filter: brightness(0);
      transition: filter 0.7s ease, transform 0.4s ease;
      display: block;
    }
    .sil-img.revealed {
      filter: brightness(1) drop-shadow(0 0 18px rgba(255,215,0,0.5));
      transform: scale(1.08);
    }
    /* Floating question marks */
    .sil-card .q-marks {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .q-mark {
      position: absolute;
      font-family: 'Press Start 2P', monospace;
      color: rgba(255,255,255,0.04);
      font-size: 28px;
      animation: floatQ 4s ease-in-out infinite;
    }
    @keyframes floatQ {
      0%, 100% { transform: translateY(0) rotate(-5deg); opacity: 0.5; }
      50%       { transform: translateY(-12px) rotate(5deg); opacity: 1; }
    }

    /* ── Loading ── */
    .loading-state {
      text-align: center;
      padding: 2.5rem 0;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--muted);
      line-height: 2.4;
      position: relative;
      z-index: 1;
    }
    .loading-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      margin: 0 3px;
      animation: dotBounce 1s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-8px); opacity: 1; }
    }

    /* ── Options grid ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .option-btn {
      padding: 14px 10px;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-transform: capitalize;
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .option-btn:not(:disabled):hover {
      border-color: var(--yellow);
      background: rgba(255,215,0,0.08);
      transform: scale(1.04);
      box-shadow: 0 0 16px rgba(255,215,0,0.12);
    }
    .option-btn.correct {
      background: rgba(0,230,118,0.12);
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 20px rgba(0,230,118,0.2);
      transform: scale(1.04);
    }
    .option-btn.wrong {
      background: rgba(255,59,59,0.12);
      border-color: var(--red);
      color: var(--red);
    }
    .option-btn:disabled { cursor: default; }

    /* ── Feedback ── */
    .feedback {
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      min-height: 24px;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }
    .feedback.good {
      color: var(--green);
      text-shadow: 0 0 12px rgba(0,230,118,0.4);
      animation: feedbackPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .feedback.bad {
      color: var(--red);
      text-shadow: 0 0 12px rgba(255,59,59,0.4);
      animation: feedbackPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes feedbackPop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── Next button ── */
    .next-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #f4a700, var(--yellow));
      color: #1a1000;
      border: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(255,215,0,0.25);
    }
    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,215,0,0.35);
    }
    .next-btn:active { transform: translateY(0); }
    .next-btn.visible { display: block; animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* ── Results screen ── */
    .result-screen {
      display: none;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .result-screen.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-screen h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--yellow);
      line-height: 2;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 16px var(--yellow-glow);
    }
    .trophy { font-size: 52px; display: block; margin-bottom: 8px; animation: floatIcon 3s ease-in-out infinite; }
    .final-score {
      font-size: 72px;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
      text-shadow: 0 0 30px var(--yellow-glow);
      margin-bottom: 4px;
    }
    .final-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .result-msg {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 2rem;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      line-height: 1.5;
    }
    .result-btns { display: flex; gap: 10px; }
    .result-btns button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid var(--card-border);
      transition: all 0.18s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f4a700, var(--yellow));
      color: #1a1000;
      border-color: var(--yellow);
      box-shadow: 0 4px 16px rgba(255,215,0,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,215,0,0.3); }
    .btn-secondary { background: var(--surface); color: var(--text); }
    .btn-secondary:hover { border-color: var(--yellow); background: rgba(255,215,0,0.06); }
  </style>
</head>
<body>

<div class="quiz-wrap">

  <div class="header">
    <span class="header-icon">⚡</span>
    <h1>¿QUIÉN ES ESE POKÉMON?</h1>
    <p>Adivina la silueta · 10 preguntas</p>
  </div>

  <!-- Pantalla de dificultad -->
  <div class="diff-screen glass" id="diff-screen">
    <h2>ELIGE DIFICULTAD</h2>
    <div class="diff-btns">
      <button class="diff-btn" onclick="startGame('easy')">
        <span class="icon">🟢</span>
        <div class="meta">Fácil <span>Solo Gen 1 · Pokémon famosos</span></div>
        <span class="arrow">›</span>
      </button>
      <button class="diff-btn" onclick="startGame('normal')">
        <span class="icon">🟡</span>
        <div class="meta">Normal <span>Gen 1–3 · Mix variado</span></div>
        <span class="arrow">›</span>
      </button>
      <button class="diff-btn" onclick="startGame('hard')">
        <span class="icon">🔴</span>
        <div class="meta">Difícil <span>Gen 1–6 · IDs aleatorios</span></div>
        <span class="arrow">›</span>
      </button>
    </div>
  </div>

  <!-- Pantalla de juego -->
  <div class="game-screen" id="game-screen">
    <div class="top-bar">
      <span class="q-counter" id="q-counter">Pregunta 1/10</span>
      <span class="score-badge" id="score-display">⭐ 0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Silueta -->
    <div class="sil-card glass" id="sil-card">
      <div class="bg-glow"></div>
      <div class="q-marks">
        <span class="q-mark" style="top:10%;left:8%;animation-delay:0s">?</span>
        <span class="q-mark" style="top:15%;right:10%;animation-delay:0.8s">?</span>
        <span class="q-mark" style="bottom:12%;left:15%;animation-delay:1.6s">?</span>
        <span class="q-mark" style="bottom:10%;right:8%;animation-delay:0.4s">?</span>
      </div>
      <div class="sil-label">¿QUIÉN ES?</div>
      <div class="sil-img-wrap">
        <img id="sil-img" class="sil-img" src="" alt="silueta del pokémon" style="display:none"/>
        <div id="loading-state" class="loading-state">
          Cargando...<br>
          <div class="loading-dots" style="margin-top:12px">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="options-grid" id="options-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Siguiente →</button>
  </div>

  <!-- Resultados -->
  <div class="result-screen glass" id="result-screen">
    <h2>RESULTADO FINAL</h2>
    <span class="trophy" id="trophy">🏆</span>
    <div class="final-score" id="final-score">0</div>
    <div class="final-sub" id="final-sub">de 10 correctas</div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-btns">
      <button class="btn-secondary" onclick="changeDifficulty()">Cambiar dificultad</button>
      <button class="btn-primary" onclick="restartSame()">Jugar de nuevo ↺</button>
    </div>
  </div>

</div>

<script>
  const DIFF_CONFIG = {
    easy:   { min: 1,   max: 151, label: 'fácil' },
    normal: { min: 1,   max: 386, label: 'normal' },
    hard:   { min: 1,   max: 721, label: 'difícil' },
  };

  let state = { diff: null, q: 0, score: 0, answered: false };

  function rnd(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function startGame(diff) {
    state.diff     = diff;
    state.q        = 0;
    state.score    = 0;
    state.answered = false;
    document.getElementById('diff-screen').style.display  = 'none';
    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    loadQuestion();
  }

  async function fetchPokemonById(id) {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
    if (!res.ok) throw new Error('not found');
    return res.json();
  }

  async function loadQuestion() {
    const cfg = DIFF_CONFIG[state.diff];

    // Limpiar UI
    document.getElementById('options-grid').innerHTML = '';
    document.getElementById('feedback').textContent   = '';
    document.getElementById('feedback').className     = 'feedback';
    document.getElementById('next-btn').classList.remove('visible');
    document.getElementById('loading-state').style.display = 'block';
    const img = document.getElementById('sil-img');
    img.style.display = 'none';
    img.className = 'sil-img';
    document.getElementById('sil-card').classList.remove('revealed-card');

    // Top bar
    document.getElementById('q-counter').textContent     = `Pregunta ${state.q + 1}/10`;
    document.getElementById('score-display').textContent  = `⭐ ${state.score}`;
    document.getElementById('progress-fill').style.width  = `${(state.q / 10) * 100}%`;

    // 4 IDs únicos al azar
    const ids = new Set();
    while (ids.size < 4) ids.add(rnd(cfg.min, cfg.max));
    const idArr      = [...ids];
    const correctIdx = Math.floor(Math.random() * 4);

    try {
      const pokemons = await Promise.all(idArr.map(id => fetchPokemonById(id)));
      const correct  = pokemons[correctIdx];

      const sprite =
        correct.sprites.other?.['official-artwork']?.front_default ||
        correct.sprites.front_default;

      if (!sprite) { loadQuestion(); return; }

      document.getElementById('loading-state').style.display = 'none';
      img.src           = sprite;
      img.style.display = 'block';
      state.correctPokemon = correct;

      const grid = document.getElementById('options-grid');
      pokemons.forEach(p => {
        const btn       = document.createElement('button');
        btn.className   = 'option-btn';
        btn.textContent = p.name;
        btn.onclick     = () => answer(btn, p.name === correct.name, correct.name, grid);
        grid.appendChild(btn);
      });

    } catch (e) {
      loadQuestion();
    }
  }

  function answer(btn, isCorrect, correctName, grid) {
    if (state.answered) return;
    state.answered = true;

    // Revelar imagen
    const img = document.getElementById('sil-img');
    img.classList.add('revealed');
    document.getElementById('sil-card').classList.add('revealed-card');

    // Marcar opciones
    grid.querySelectorAll('.option-btn').forEach(b => {
      b.disabled = true;
      if (b.textContent === correctName) b.classList.add('correct');
    });

    const feedback = document.getElementById('feedback');
    const badge    = document.getElementById('score-display');

    if (isCorrect) {
      state.score++;
      btn.classList.add('correct');
      feedback.textContent = '¡Correcto! 🎉';
      feedback.classList.add('good');
      badge.classList.add('bump');
      setTimeout(() => badge.classList.remove('bump'), 400);
    } else {
      btn.classList.add('wrong');
      feedback.textContent = `Era ${correctName} 😔`;
      feedback.classList.add('bad');
    }

    badge.textContent = `⭐ ${state.score}`;
    document.getElementById('next-btn').classList.add('visible');
    state.answered = false;
  }

  function nextQuestion() {
    state.q++;
    if (state.q >= 10) showResults();
    else loadQuestion();
  }

  function showResults() {
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('final-score').textContent   = state.score;
    document.getElementById('final-sub').textContent     =
      `de 10 correctas · dificultad ${DIFF_CONFIG[state.diff].label}`;

    const results = [
      [0,  3,  '😅', '¡Sigue entrenando, futuro Maestro Pokémon! 💪'],
      [4,  6,  '📖', '¡Nada mal! Tu Pokédex está creciendo.'],
      [7,  8,  '🏅', '¡Impresionante! Casi eres un Campeón de Liga.'],
      [9,  10, '🏆', '¡PERFECTO! Eres un verdadero Maestro Pokémon ⭐'],
    ];
    const r = results.find(([min, max]) => state.score >= min && state.score <= max);
    document.getElementById('trophy').textContent    = r[2];
    document.getElementById('result-msg').textContent = r[3];
  }

  function changeDifficulty() {
    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('diff-screen').style.display = 'block';
  }

  function restartSame() {
    startGame(state.diff);
  }
</script>

</body>
</html>
